apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-deploy-ey-cart
  namespace: ashutosh-ns
  labels:
    app: ey-cart
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ey-cart
  template:
    metadata:
      labels:
        app: ey-cart
    spec:
      containers:
      - name: ey-cart-cont
        image: muralisocial123/flipkart-app-web:v1.1.0
        ports:
        - containerPort: 80


