apiVersion: apps/v1
kind: Deployment
metadata:
  name: fitness-deployment
  namespace: ashutosh-ns
  labels:
    app: fitness
spec:
  replicas: 8

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%

  selector:
    matchLabels:
      app: fitness

  template:
    metadata:
      labels:
        app: fitness

    spec:
      containers:
        - name: fitness-container
          image: kyndrl-flower-app:v1.0.1
          ports:
            - containerPort: 3015

