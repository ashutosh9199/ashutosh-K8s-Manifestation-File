apiVersion: apps/v1
kind: Deployment
metadata:
  name: fitness-deployment
  namespace: ashutosh-ns
  labels:
    app: fitness
spec:
  replicas: 8

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%

  selector:
    matchLabels:
      app: fitness

  template:
    metadata:
      labels:
        app: fitness

    spec:
      containers:
        - name: fitness-container
          image: muralisocial123/fitness-app:v1.0.1
          ports:
            - containerPort: 3015
---
apiVersion: v1
kind: Service
metadata:
  name: fitness-deployment-svc
  namespace: ashutosh-ns
spec:
  selector:
    app: fitness
  ports:
    - port: 3001 #it is a service port number we are using to expose application to the internet
      targetPort: 3000
      protocol: TCP
  type: ClusterIP



